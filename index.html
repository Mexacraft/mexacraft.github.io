<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mexacraft - Servidor Oficial</title>

<link rel="icon" type="image/png" href="https://cdn.discordapp.com/icons/1426092940786270262/33c66ed784f44d2a4dce0721827ad388.png?size=128">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Poppins',sans-serif;
    color:white;
    overflow-x:hidden;
}

/* FONDO ANIMADO */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#1c1c1c);
    background-size:600% 600%;
    animation:gradientMove 12s ease infinite;
    z-index:-1;
}

@keyframes gradientMove {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* LOGO */
.logo {
    width:120px;
    height:120px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
    transition:0.3s;
}

.logo:hover {
    transform:scale(1.05);
    filter:drop-shadow(0 0 12px white);
}

/* CONTENIDO */
.container {
    text-align:center;
    padding:80px 20px;
}

h1 { font-size:55px; letter-spacing:2px; }
.sub { color:#bbb; }

/* BOTONES */
.botones { margin-top:30px; }

.boton {
    display:inline-block;
    margin:10px;
    padding:12px 25px;
    border-radius:30px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(5px);
    border:1px solid rgba(255,255,255,0.2);
    cursor:pointer;
    transition:0.3s;
}

.boton:hover {
    background:white;
    color:black;
    transform:translateY(-3px);
}

/* 🔥 DISCORD CARD NUEVO */
#discordPreview {
    position:fixed;
    top:50%;
    right:50px;
    transform:translateY(-50%);
    width:140px;
    height:140px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
    object-fit:contain;
}

/* BOX SERVERS */
.server-box {
    margin-top:40px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.server-item {
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    width:220px;
    cursor:pointer;
    transition:0.3s;
}

.server-item:hover {
    transform:translateY(-5px);
    background:rgba(255,255,255,0.2);
}

/* ESTADO */
.estado {
    margin-top:25px;
    display:inline-block;
    padding:20px;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
}

/* MODALIDADES */
.modalidades { margin-top:80px; }

.cards {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card {
    width:260px;
    padding:30px;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-10px) scale(1.03);
    background:rgba(255,255,255,0.18);
}

/* TOAST */
.toast {
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.2);
    padding:12px 25px;
    border-radius:30px;
    opacity:0;
    transition:0.4s;
}

.toast.show {
    opacity:1;
    transform:translateX(-50%) translateY(-10px);
}
</style>
</head>

<body>

<audio id="hoverSound" src="https://www.myinstants.com/media/sounds/minecraft-click.mp3"></audio>

<!-- 🔥 DISCORD CARD -->
<img id="discordPreview"
src="https://toppng.com/public/uploads/preview/discord-logo-01-discord-logo-11562849833clsolz2mbc.png">

<div class="container">

<img class="logo" src="https://cdn.discordapp.com/icons/1426092940786270262/33c66ed784f44d2a4dce0721827ad388.png?size=2048">

<h1>MEXACRAFT</h1>
<p class="sub">Servidor con experiencias únicas y comunidad activa</p>

<div class="botones">
<div class="boton discordBtn" onclick="window.open('https://discord.gg/8RDbZZAAb3')">Discord</div>
<div class="boton" onclick="window.open('https://mexacraft.tebex.io/')">Tienda</div>
</div>

<div class="server-box">
<div class="server-item" onclick="copiar('mc.mexacraft.com')">
<strong>IP</strong><br>mc.mexacraft.com
</div>

<div class="server-item" onclick="copiar('25565')">
<strong>Puerto</strong><br>25565
</div>
</div>

<div id="estadoServidor" class="estado">
Cargando servidor...
</div>

<div class="modalidades">
<h2>Modalidades</h2>

<div class="cards">
<div class="card">Survival OP</div>
<div class="card">BedWars</div>
<div class="card">Survival Custom</div>
<div class="card">Survival Vanilla</div>
<div class="card">UHC</div>
</div>
</div>

</div>

<div id="toast" class="toast">✔ Copiado</div>

<script>

function copiar(texto){
navigator.clipboard.writeText(texto);
let t=document.getElementById("toast");
t.classList.add("show");
setTimeout(()=>t.classList.remove("show"),2000);
}

/* sonido hover */
const sound=document.getElementById("hoverSound");
let ready=false;

document.addEventListener("click",()=>ready=true,{once:true});

function play(){
if(!ready) return;
sound.currentTime=0;
sound.volume=0.1;
sound.play();
}

document.querySelectorAll(".boton,.server-item,.card").forEach(el=>{
el.addEventListener("mouseenter",play);
});

/* hover discord preview */
const btn=document.querySelector(".discordBtn");
const preview=document.getElementById("discordPreview");

btn.addEventListener("mouseenter",()=>{
preview.style.opacity="1";
preview.style.transform="translateY(-50%) scale(1.05)";
});

btn.addEventListener("mouseleave",()=>{
preview.style.opacity="0";
preview.style.transform="translateY(-50%) scale(1)";
});

/* estado server */
async function estado(){
try{
let res=await fetch("https://api.mcsrvstat.us/2/mc.mexacraft.com");
let data=await res.json();

let box=document.getElementById("estadoServidor");

box.innerHTML = data.online
? `🟢 Online<br>👥 ${data.players.online}/${data.players.max} jugadores`
: "🔴 Offline";

}catch{
document.getElementById("estadoServidor").innerHTML="⚠ Error";
}
}

estado();
setInterval(estado,30000);

</script>

</body>
</html>
